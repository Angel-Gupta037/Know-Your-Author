<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Know Your Author</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Georgia', serif;
            background-color: #0f0e0e;
            color: #e8e0d5;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
            border-bottom: 1px solid #2a2a2a;
        }

        header h1 {
            font-size: 2.8rem;
            letter-spacing: 2px;
            color: #c9a96e;
        }

        header p {
            margin-top: 10px;
            font-size: 1rem;
            color: #888;
            font-style: italic;
        }

        .search-section {
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e8e0d5;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            outline: none;
        }

        input:focus { border-color: #c9a96e; }

        button {
            padding: 14px 28px;
            background: #c9a96e;
            color: #0f0e0e;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-family: 'Georgia', serif;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #b8934a; }

        #results {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .author-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .author-card h2 {
            color: #c9a96e;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .author-card p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .reading-path h3 {
            color: #e8e0d5;
            margin-bottom: 16px;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .book-item {
            border-left: 3px solid #c9a96e;
            padding: 12px 16px;
            margin-bottom: 14px;
            background: #111;
            border-radius: 0 6px 6px 0;
        }

        .book-item .order {
            color: #c9a96e;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .book-item .title {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .book-item .why {
            color: #888;
            font-size: 0.88rem;
            line-height: 1.6;
            font-style: italic;
        }

        .no-path {
            color: #888;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .error { color: #e07070; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>Know Your Author</h1>
    <p>Not sure where to start? We'll tell you.</p>
</header>

<div class="search-section">
    <div class="search-box">
        <input type="text" id="authorInput" placeholder="Enter an author's name..." />
        <button onclick="searchAuthor()">Explore</button>
    </div>
</div>

<div id="results"></div>

<script>
async function searchAuthor() {
    const name = document.getElementById('authorInput').value.trim();
    if (!name) return;

    const results = document.getElementById('results');
    results.innerHTML = '<p style="text-align:center;color:#888;">Searching...</p>';

    try {
        const [authorRes, pathRes] = await Promise.all([
            fetch(`http://localhost:8000/author/${name}`),
            fetch(`http://localhost:8000/author/${name}/where-to-start`)
        ]);

        const author = await authorRes.json();
        const path = await pathRes.json();

        let pathHTML = '';

        if (path.reading_path && path.reading_path.length > 0) {
            pathHTML = `
                <div class="reading-path">
                    <h3>Where to Begin</h3>
                    ${path.reading_path.map(book => `
                        <div class="book-item">
                            <div class="order">Start #${book.order}</div>
                            <div class="title">${book.book}</div>
                            <div class="why">${book.why}</div>
                        </div>
                    `).join('')}
                </div>`;
        } else {
            pathHTML = '<p class="no-path">No curated reading path yet for this author.</p>';
        }

        results.innerHTML = `
            <div class="author-card">
                <h2>${author.name || name}</h2>
                <p>${author.work_count || ''} works · Born ${author.birth_date || 'unknown'}</p>
                ${pathHTML}
            </div>`;

    } catch(e) {
        results.innerHTML = '<p class="error">Something went wrong. Is the server running?</p>';
    }
}

document.getElementById('authorInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') searchAuthor();
});
</script>

</body>
</html>
