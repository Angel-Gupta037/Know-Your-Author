<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Know Your Author</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #c3c88c;
            --dark-purple: #30253e;
            --russian-green: #638872;
            --pewter-blue: #8089b1;
            --cambridge-blue: #94b8a3;
            --cream: #f5f2ea;
            --off-white: #faf8f3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--off-white);
            color: var(--dark-purple);
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 60px;
            background: var(--off-white);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-purple);
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-purple);
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .nav-links a:hover { opacity: 1; }

        .nav-pill {
            background: var(--dark-purple);
            color: var(--cream);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        /* HERO */
        .hero {
            padding: 60px 60px 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            min-height: 70vh;
            position: relative;
        }

        .hero-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 900;
            line-height: 1.05;
            color: var(--dark-purple);
            margin-bottom: 24px;
        }

        .hero-left h1 em {
            font-style: italic;
            color: var(--russian-green);
        }

        .hero-left p {
            font-size: 1rem;
            color: var(--dark-purple);
            opacity: 0.6;
            max-width: 400px;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .search-wrapper {
            display: flex;
            gap: 0;
            max-width: 500px;
            background: white;
            border: 1.5px solid var(--dark-purple);
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 4px 4px 0px var(--dark-purple);
        }

        .search-wrapper input {
            flex: 1;
            padding: 16px 24px;
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            background: transparent;
            color: var(--dark-purple);
        }

        .search-wrapper input::placeholder { color: #aaa; }

        .search-wrapper button {
            padding: 14px 28px;
            background: var(--dark-purple);
            color: var(--cream);
            border: none;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            margin: 4px;
            transition: background 0.2s;
        }

        .search-wrapper button:hover { background: var(--russian-green); }

        /* HERO RIGHT — decorative book blobs */
        .hero-right {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 16px;
            height: 460px;
        }

        .hero-book {
            border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
            overflow: hidden;
            background: var(--sage);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--dark-purple);
            text-align: center;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .hero-book:hover { transform: scale(1.03); }
        .hero-book:nth-child(1) { background: var(--sage); border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%; }
        .hero-book:nth-child(2) { background: var(--cambridge-blue); border-radius: 40% 60% 45% 55% / 60% 40% 60% 40%; margin-top: 30px; }
        .hero-book:nth-child(3) { background: var(--pewter-blue); border-radius: 55% 45% 40% 60% / 45% 55% 45% 55%; margin-top: -20px; }
        .hero-book:nth-child(4) { background: #e8c99a; border-radius: 45% 55% 60% 40% / 55% 45% 55% 45%; }

        .hero-book img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* FEATURED AUTHORS */
        .featured {
            padding: 20px 60px 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .featured span {
            font-size: 0.8rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .author-chip {
            padding: 8px 18px;
            border: 1px solid rgba(48,37,62,0.2);
            border-radius: 20px;
            font-size: 0.83rem;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--dark-purple);
            font-family: 'DM Sans', sans-serif;
        }

        .author-chip:hover {
            background: var(--dark-purple);
            color: var(--cream);
            border-color: var(--dark-purple);
        }

        /* DIVIDER */
        .divider {
            margin: 40px 60px;
            height: 1px;
            background: rgba(48,37,62,0.1);
        }

        /* RESULTS */
        #results {
            padding: 0 60px 80px;
        }

        .results-header {
            margin-bottom: 32px;
        }

        .results-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--dark-purple);
        }

        .results-header p {
            color: var(--dark-purple);
            opacity: 0.5;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        /* AUTHOR INFO STRIP */
        .author-info-strip {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--dark-purple);
            color: var(--cream);
            padding: 24px 32px;
            border-radius: 16px;
            margin-bottom: 32px;
        }

        .author-info-strip .author-initial {
            width: 56px;
            height: 56px;
            background: var(--sage);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--dark-purple);
            font-weight: 700;
            flex-shrink: 0;
        }

        .author-info-strip .author-meta h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .author-info-strip .author-meta p {
            font-size: 0.85rem;
            opacity: 0.6;
        }

        /* READING PATH SECTION */
        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--russian-green);
            font-weight: 500;
            margin-bottom: 20px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .book-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(48,37,62,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(48,37,62,0.1);
        }

        .book-card-cover {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-style: italic;
            color: var(--dark-purple);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .book-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-card-cover.no-cover {
            background: linear-gradient(135deg, var(--sage) 0%, var(--cambridge-blue) 100%);
        }

        .order-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--dark-purple);
            color: var(--cream);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
        }

        .start-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--russian-green);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .book-card-body {
            padding: 18px;
        }

        .book-card-body h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: var(--dark-purple);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .book-card-body .why {
            font-size: 0.82rem;
            color: var(--dark-purple);
            opacity: 0.6;
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1.5px solid var(--dark-purple);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            color: var(--dark-purple);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .add-btn:hover {
            background: var(--dark-purple);
            color: var(--cream);
        }

        .add-btn.added {
            background: var(--russian-green);
            border-color: var(--russian-green);
            color: white;
        }

        /* ALL BOOKS SECTION */
        .all-books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .small-book-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid rgba(48,37,62,0.08);
            transition: transform 0.2s;
        }

        .small-book-card:hover { transform: translateY(-2px); }

        .small-book-cover {
            height: 120px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 0.8rem;
            font-style: italic;
            text-align: center;
            padding: 10px;
            color: var(--dark-purple);
        }

        .small-book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .small-book-card h5 {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--dark-purple);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .small-book-card p {
            font-size: 0.75rem;
            color: var(--dark-purple);
            opacity: 0.5;
        }

        /* NO PATH */
        .no-path {
            background: var(--cream);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            color: var(--dark-purple);
            opacity: 0.5;
            font-style: italic;
            margin-bottom: 32px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark-purple);
            color: var(--cream);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.88rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 999;
            max-width: 320px;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--dark-purple);
            opacity: 0.4;
            font-style: italic;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
        }

        .hero-book {
            flex-direction: column;
            gap: 8px;
        }

        .blob-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            font-style: italic;
            color: var(--dark-purple);
            text-align: center;
        }

        .blob-author {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            color: var(--dark-purple);
        }
        /* COVER COLORS */
        .cover-0 { background: linear-gradient(135deg, #c3c88c, #94b8a3); }
        .cover-1 { background: linear-gradient(135deg, #8089b1, #638872); }
        .cover-2 { background: linear-gradient(135deg, #94b8a3, #c3c88c); }
        .cover-3 { background: linear-gradient(135deg, #e8c99a, #8089b1); }
        .cover-4 { background: linear-gradient(135deg, #638872, #30253e); color: #f5f2ea !important; }

        @media (max-width: 768px) {
            nav { padding: 20px 24px; }
            .hero { grid-template-columns: 1fr; padding: 40px 24px; min-height: auto; }
            .hero-right { display: none; }
            .featured, #results, .divider { padding-left: 24px; padding-right: 24px; }
            .divider { margin-left: 24px; margin-right: 24px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/home" class="nav-logo">KYA</a>
    <ul class="nav-links">
        <li><a href="/home">Discover</a></li>
        <li><a href="/my-list">My List</a></li>
        <li><a href="#">About</a></li>
    </ul>
    <div class="nav-pill">2026</div>
</nav>

<section class="hero">
    <div class="hero-left">
        <h1>Know Your<br><em>Author.</em></h1>
        <p>Every great author has a best first book. We'll tell you exactly where to begin — and why.</p>
        <div class="search-wrapper">
            <input type="text" id="authorInput" placeholder="Search an author..." />
            <button onclick="searchAuthor()">Explore →</button>
        </div>
    </div>
    <div class="hero-right">
    <div class="hero-book cover-0">
        <span class="blob-title">Metamorphosis</span>
        <span class="blob-author">Kafka</span>
    </div>
    <div class="hero-book cover-1">
        <span class="blob-title">The Alchemist</span>
        <span class="blob-author">Coelho</span>
    </div>
    <div class="hero-book cover-2">
        <span class="blob-title">1984</span>
        <span class="blob-author">Orwell</span>
    </div>
    <div class="hero-book cover-3">
        <span class="blob-title">Kite Runner</span>
        <span class="blob-author">Hosseini</span>
    </div>
</div>
</section>

<div class="featured">
    <span>Try →</span>
    <button class="author-chip" onclick="quickSearch('Kafka')">Kafka</button>
    <button class="author-chip" onclick="quickSearch('George Orwell')">George Orwell</button>
    <button class="author-chip" onclick="quickSearch('Khaled Hosseini')">Khaled Hosseini</button>
    <button class="author-chip" onclick="quickSearch('Paulo Coelho')">Paulo Coelho</button>
    <button class="author-chip" onclick="quickSearch('Mitch Albom')">Mitch Albom</button>
    <button class="author-chip" onclick="quickSearch('Dolly Alderton')">Dolly Alderton</button>
</div>

<div class="divider"></div>

<div id="results"></div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8000';

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function quickSearch(name) {
    document.getElementById('authorInput').value = name;
    searchAuthor();
}

function getCoverUrl(title) {
    return `https://covers.openlibrary.org/b/title/${encodeURIComponent(title)}-M.jpg`;
}

async function addToList(title, author, btn) {
    try {
        const res = await fetch(`${API}/books`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, author })
        });
        const data = await res.json();
        btn.textContent = '✓ Added';
        btn.classList.add('added');
        btn.disabled = true;
        showToast(data.message);
    } catch(e) {
        showToast('Could not add book. Is the server running?');
    }
}

async function searchAuthor() {
    const name = document.getElementById('authorInput').value.trim();
    if (!name) return;

    const results = document.getElementById('results');
    results.innerHTML = '<div class="loading">Searching the library...</div>';

    try {
        const [authorRes, pathRes, booksRes] = await Promise.all([
            fetch(`${API}/author/${encodeURIComponent(name)}`),
            fetch(`${API}/author/${encodeURIComponent(name)}/where-to-start`),
            fetch(`${API}/author/${encodeURIComponent(name)}/books`)
        ]);

        const author = await authorRes.json();
        const path = await pathRes.json();
        const booksData = await booksRes.json();

        const authorName = author.name || name;
        const initial = authorName.charAt(0).toUpperCase();

        // reading path HTML
        let pathHTML = '';
        if (path.reading_path && path.reading_path.length > 0) {
            const cards = path.reading_path.map((book, i) => {
                const coverUrl = getCoverUrl(book.book);
                return `
                <div class="book-card">
                    <div class="book-card-cover no-cover cover-${i % 5}">
                        <img src="${coverUrl}" 
                             onerror="this.style.display='none'" 
                             alt="${book.book}" />
                        <div class="order-badge">${book.order}</div>
                        ${i === 0 ? '<div class="start-badge">Start here</div>' : ''}
                    </div>
                    <div class="book-card-body">
                        <h4>${book.book}</h4>
                        <p class="why">${book.why}</p>
                        <button class="add-btn" onclick="addToList('${book.book.replace(/'/g,"\\'")}', '${authorName.replace(/'/g,"\\'")}', this)">
                            + Add to my list
                        </button>
                    </div>
                </div>`;
            }).join('');

            pathHTML = `
                <p class="section-label">Where to begin</p>
                <div class="books-grid">${cards}</div>`;
        } else {
            pathHTML = `
                <p class="section-label">Where to begin</p>
                <div class="no-path">No curated reading path yet for this author. Check back soon.</div>`;
        }

        // all books HTML
        let allBooksHTML = '';
        if (booksData.books && booksData.books.length > 0) {
            const smallCards = booksData.books.map((book, i) => {
                const coverUrl = getCoverUrl(book.title);
                return `
                <div class="small-book-card">
                    <div class="small-book-cover cover-${i % 5}">
                        <img src="${coverUrl}" 
                             onerror="this.style.display='none'" 
                             alt="${book.title}" />
                    </div>
                    <h5>${book.title}</h5>
                    <p>${book.year || 'Unknown year'}</p>
                </div>`;
            }).join('');

            allBooksHTML = `
                <p class="section-label" style="margin-top:40px;">More works</p>
                <div class="all-books-grid">${smallCards}</div>`;
        }

        results.innerHTML = `
            <div class="results-header">
                <h2>${authorName}</h2>
                <p>${author.work_count || ''} works in the Open Library</p>
            </div>
            <div class="author-info-strip">
                <div class="author-initial">${initial}</div>
                <div class="author-meta">
                    <h3>${authorName}</h3>
                    <p>Born ${author.birth_date || 'unknown'} · ${author.work_count || '?'} works</p>
                </div>
            </div>
            ${pathHTML}
            ${allBooksHTML}
        `;

    } catch(e) {
        results.innerHTML = '<div class="loading">Something went wrong. Is the server running?</div>';
    }
}

document.getElementById('authorInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') searchAuthor();
});
</script>

</body>
</html>
